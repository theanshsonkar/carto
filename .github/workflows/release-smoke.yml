name: Release Smoke

on:
  push:
    tags:
      - 'v*'
  pull_request:
    # Run on PRs that touch packaging — those are the ones most likely
    # to break installs without breaking tests.
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.npmignore'

jobs:
  install-from-pack:
    name: Install ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Bookend versions only — intermediate Node versions are covered
        # by test.yml, and this matrix exists to catch packaging issues
        # not Node-version compatibility.
        node: [18, 22]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Pack the package
        run: npm pack

      - name: Install the tarball into a clean dir (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          INSTALL_DIR="$RUNNER_TEMP/install-test"
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          npm init -y > /dev/null
          # Find the tarball that npm pack produced (single match expected).
          TARBALL=$(ls "$GITHUB_WORKSPACE"/carto-md-*.tgz | head -n1)
          echo "Installing $TARBALL"
          npm install "$TARBALL" --legacy-peer-deps

      - name: Install the tarball into a clean dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $InstallDir = "$env:RUNNER_TEMP\install-test"
          New-Item -ItemType Directory -Force -Path $InstallDir | Out-Null
          Set-Location $InstallDir
          npm init -y | Out-Null
          $Tarball = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "carto-md-*.tgz" | Select-Object -First 1
          Write-Host "Installing $($Tarball.FullName)"
          npm install "$($Tarball.FullName)" --legacy-peer-deps

      - name: Smoke-test the binary (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          cd "$RUNNER_TEMP/install-test"
          # The binary should print help and exit cleanly.
          ./node_modules/.bin/carto --help

      - name: Smoke-test the binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location "$env:RUNNER_TEMP\install-test"
          & ".\node_modules\.bin\carto.cmd" --help
